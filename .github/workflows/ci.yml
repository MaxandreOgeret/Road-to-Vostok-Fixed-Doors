name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Install GDScript tools
        run: uv tool install gdtoolkit

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: ./scripts/lint.sh

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build archives
        run: ./scripts/build_vmz.sh

      - name: Upload VMZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixedDoors.vmz
          path: FixedDoors.vmz
