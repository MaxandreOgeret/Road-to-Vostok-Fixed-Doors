name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Install GDScript tools
        run: uv tool install gdtoolkit

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: ./scripts/lint.sh

  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build archives
        run: ./scripts/build_vmz.sh

      - name: Upload VMZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixedDoors archives
          path: |
            FixedDoors.vmz
            FixedDoors.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! perl -e 'exit($ARGV[0] =~ /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/ ? 0 : 1)' "$GITHUB_REF_NAME"; then
            echo "Skipping non-SemVer tag: $GITHUB_REF_NAME"
            exit 0
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" FixedDoors.vmz FixedDoors.zip --clobber
          else
            gh release create "$GITHUB_REF_NAME" FixedDoors.vmz FixedDoors.zip --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
          fi
